name: validate

on:
  push:
  pull_request:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Latest HA (floats via requirements-dev.txt).
          - python-version: '3.14'
            requirements: requirements-dev.txt
            lint: true
          # Declared minimum (hacs.json): HA 2025.1.0.
          - python-version: '3.12'
            requirements: requirements-min.txt
            lint: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r ${{ matrix.requirements }}
      - if: ${{ matrix.lint }}
        run: ruff check .
      - run: python -m pytest tests -v
