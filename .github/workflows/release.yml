name: release

# Fires when the monorepo's homeassistant-mirror workflow forwards a
# release tag: ha-vX.Y.Z in the monorepo becomes vX.Y.Z here. Tests, stamps
# X.Y.Z into manifest.json, builds plaiiinlight.zip and attaches it to the
# GitHub release. HACS installs the zip (hacs.json: zip_release + filename),
# so the version bump never needs a commit — the repo's manifest.json keeps
# a placeholder version. Re-pushing the same monorepo tag recreates the
# release (repair path for a failed run).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Test
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          python -m pytest tests -v
      - name: Build zip with stamped version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST=custom_components/plaiiinlight/manifest.json
          jq --arg v "$VERSION" '.version = $v' "$MANIFEST" > /tmp/manifest.json
          mv /tmp/manifest.json "$MANIFEST"
          cd custom_components/plaiiinlight
          zip -r /tmp/plaiiinlight.zip . -x '*__pycache__*' -x '*.pyc'
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Recreate on re-run so a re-pushed tag can repair a failed release.
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && \
            gh release delete "$GITHUB_REF_NAME" -y
          gh release create "$GITHUB_REF_NAME" /tmp/plaiiinlight.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
